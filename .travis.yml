language: node_js
node_js: stable

# S: Build Lifecycle
install:
  - npm install


# before_script:
 # - npm install -g gulp
   
script:
  - git clone https://github.com/klmmlk/hexo-theme-next themes/next
  - hexo g

after_script:
  - cd ./public
  - git init
  - git config user.name "klmmlk"
  - git config user.email "jiong-lin@live.com"
  - git add .
  - git commit -m "Update docs"
  - git push --force --quiet "https://${github}@${GH_REF}" master:master
# E: Build LifeCycle

branches:
  only:
    - blog-source
env:
 global:
   - GH_REF: github.com/klmmlk/klmmlk.github.io.git
